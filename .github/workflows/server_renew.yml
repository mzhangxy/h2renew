name: Auto Renew Server

# 触发条件
on:
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击运行按钮
  schedule:
    - cron: '0 8 * * *' # 每天 UTC 时间 8:00 (北京时间 16:00) 自动运行一次，你可以以后再调整

jobs:
  renew-job:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟服务器

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests 

      - name: Run Auto Renew Script
        env:
          ACCOUNTS_DATA: ${{ secrets.ACCOUNTS_DATA }} 
          NOPECHA_API_KEY: ${{ secrets.NOPECHA_API_KEY }}
        run: |
          python main.py
          
      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() # 无论成功还是失败，都尝试上传
        with:
          name: debug-files
          path: |
            *.png
            *.html
